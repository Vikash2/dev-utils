    <meta name="description" content="Dev Utils - Universal Code Editor, Diff Checker, JSON & XML Formatter" />
    <title>Dev Utils - Code Editor & Formatter Tools</title>
    
    <!-- Handle GitHub Pages SPA redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
